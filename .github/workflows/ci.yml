name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm type-check
        continue-on-error: false

      - run: pnpm lint
        continue-on-error: false

      - run: pnpm test --run
        continue-on-error: false