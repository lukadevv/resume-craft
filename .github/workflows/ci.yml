name: CI

on:
  pull_request:
  push:
    branches:
      - main 

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'
          cache: 'npm'

      - run: npm ci

      - run: npm run type-check
        continue-on-error: false

      - run: npm run lint
        continue-on-error: false

      - run: npm test
        continue-on-error: false
