name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript Type Check
        run: pnpm type-check
        continue-on-error: false

      - name: Lint
        run: pnpm lint
        continue-on-error: false

      - name: Run Tests
        run: pnpm test
        continue-on-error: false

      - name: Build Next.js
        run: pnpm build
        continue-on-error: false

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@4 pages deploy out --project-name=resume
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Ping IndexNow
        if: github.event_name == 'push'
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "resume.lukadevv.com",
              "key": "5495d50aa98847889da528acb9c0cac7",
              "keyLocation": "https://resume.lukadevv.com/5495d50aa98847889da528acb9c0cac7.txt",
              "urlList": [
                "https://resume.lukadevv.com/",
                "https://resume.lukadevv.com/templates",
                "https://resume.lukadevv.com/blog",
                "https://resume.lukadevv.com/create",
                "https://resume.lukadevv.com/faq"
              ]
            }'
          echo "IndexNow ping sent"
